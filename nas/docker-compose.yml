services:
  plex:
    container_name: plex
    image: plexinc/pms-docker:latest
    environment:
      - PLEX_UID=999
      - PLEX_GID=999
      - TZ=Some/Region
      - PLEX_CLAIM=claim-code
      - ADVERTISE_IP=http://plex.yourdomain.com:32400/
    ports:
      - 32400:32400/tcp #main plex app
      - 8324:8324/tcp   #plex roku/plex companion control
      - 32469:32469/tcp #plex dlna
      - 32410:32410/udp # gdm network discovery
      - 32412:32412/udp # gdm network discovery
      - 32413:32413/udp # gdm network discovery
      - 32414:32414/udp # gdm network discovery
    volumes:
      - /mnt/app/db/plex/config:/config
      - /mnt/transcode/temp:/transcode
      - /mnt/data/media:/data/media
      - /dev/dvb:/dev/dvb # USB TV Tuner
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/dri:/dev/dri

  traefik:
    image: traefik:latest
    container_name: "traefik"
    environment:
      - NAMECHEAP_API_USER=user
      - NAMECHEAP_API_KEY=keyy
      - NAMECHEAP_TTL=1
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=24h"
      - "--certificatesresolvers.myresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.myresolver.acme.dnschallenge.provider=namecheap"
      - "--certificatesresolvers.myresolver.acme.caserver=https://acme-v02.api.letsencrypt.org/directory"
      - "--certificatesresolvers.myresolver.acme.email=your@email.com"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--accesslog=true"
      - "--accesslog.filepath=/var/log/traefik/access.log"
      - "--accesslog.bufferingsize=100"
    ports:
      - "80:80"
      - "443:443"
      - "8282:8080"
    volumes:
      - /mnt/app/db/traefik/letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/app/db/traefik/logs:/var/log/traefik

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
     - /mnt/app/db/seerr:/app/config
    ports:
     - 5055:5055
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seerr.rule=Host(`requests.yourdomain.com`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls.certresolver=myresolver"

  requestrr:
    container_name: requestrr
    image: thomst08/requestrr
    ports:
      - 4545:4545
    volumes:
      - /mnt/app/db/requestrr:/root/config
    restart: unless-stopped

  wizarr:
    container_name: wizarr
    image: ghcr.io/wizarrrr/wizarr:latest
    environment:
      - TZ=Some/Region
      - DISABLE_INBUILT_AUTH=false #Set to true ONLY if you are using another auth provider (Authelia, Authentik, etc)
      - ALLOW_BUG_REPORTING=true #Helps me fix bugs, but you can disable it if you want! I use Sentry.io for this.
      - PUID=999
      - PGID=999
    volumes:
      - /mnt/app/db/wizarr:/data/database
    ports:
      - 5690:5690
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wizarr.rule=Host(`join.yourdomain.com`)"
      - "traefik.http.routers.wizarr.entrypoints=websecure"
      - "traefik.http.routers.wizarr.tls.certresolver=myresolver"

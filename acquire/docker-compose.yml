# host: server
# project: acquire — VPN-fronted downloaders + indexers + direct usenet
#
# Phase 4 trust zone — HIGHEST risk class (fetches attacker-controlled
# content). Services migrated from:
#   - media/  — gluetun, gluetun-qbt, qbittorrent, qui, prowlarr,
#               flaresolverr, autobrr, lounge, sabnzbd
#   - music/  — gluetun-music (renamed-context), slskd, soularr,
#               slskd-port-sync
#
# In music/, gluetun is named `gluetun` with `container_name: gluetun-music`.
# After moving into acquire/, the service-key collides with media/'s
# `gluetun`, so we rename the service-key to `gluetun-music` to match
# container_name and make `network_mode: "service:..."` references
# unambiguous.

x-defaults: &defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging: &log
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Phase 5: cap_drop baseline. Consumers do `<<: *hardened` + inline
# `cap_add: [...]` for caps they need back. `cap_drop: [ALL]` removes
# the 14 default capabilities Docker grants.
x-hardened: &hardened
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging: *log

# Phase 5: LSIO/PUID-based containers need these 5 caps to chown +
# drop privileges at startup.
x-lsio-caps: &lsio_caps
  - CHOWN
  - FOWNER
  - DAC_OVERRIDE
  - SETUID
  - SETGID

services:
  # gluetun — primary VPN egress for media-side indexers/downloaders
  gluetun:
    <<: *hardened
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    container_name: gluetun
    # NET_ADMIN for tun/iptables/wireguard. The rest is the LSIO 5-cap
    # set — gluetun chowns + chmods /etc/openvpn/{target.ovpn,auth.conf}
    # to its internal openvpn user before exec'ing, and reopens the
    # file from that user (so DAC_OVERRIDE on the read path too).
    cap_add:
      - NET_ADMIN
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    volumes:
      - /mnt/app/db/gluetun:/gluetun
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ../common/secrets/.runtime/vpn.env
    environment:
      - VPN_SERVICE_PROVIDER=PROVIDER
      - SERVER_REGIONS=REGION
      - FIREWALL_OUTBOUND_SUBNETS=SUBNETS
      - HTTP_CONTROL_SERVER_ADDRESS=:8011
    ports:
      - 8888:8888/tcp # HTTP
      - 8388:8388/tcp # Shadowsocks
      - 8388:8388/udp # Shadowsocks
      - 8191:8191/tcp # flaresolverr
      - 9696:9696/tcp # prowlarr
      - 7474:7474/tcp # autobrr
      - 9000:9000/tcp # thelounge
      - 8011:8011 # control server
    healthcheck:
      test: ["CMD-SHELL", "/gluetun-entrypoint healthcheck"]
      interval: 5s
      timeout: 5s
      start_period: 90s
      retries: 3
    networks:
      - vpn_egress
      - arr_control

  prowlarr:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/prowlarr:develop@sha256:e55d41d4b24e8be63212c9292aa5cd20bb4cb330dfb4a896dd35c43d2a092931
    container_name: prowlarr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/prowlarr:/config
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:9696/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"

  autobrr:
    <<: *hardened
    image: ghcr.io/autobrr/autobrr:v1.79.0
    container_name: autobrr
    user: 999:999
    environment:
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/autobrr/config:/config
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  lounge:
    <<: *hardened
    # Image entrypoint uses `su` to drop to the `thelounge` user and
    # runs `find` to fix /var/opt/thelounge perms on every start.
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    image: ghcr.io/thelounge/thelounge:4
    container_name: lounge
    volumes:
      - /mnt/app/db/lounge:/var/opt/thelounge
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  flaresolverr:
    <<: *hardened
    cap_add: *lsio_caps
    image: ghcr.io/flaresolverr/flaresolverr:v3.4.6
    container_name: flaresolverr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
      - LOG_LEVEL=info
      - LOG_HTML=false
      - CAPTCHA_SOLVER=none
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  # gluetun-qbt — secondary VPN egress for qBittorrent (port-forwarding on)
  gluetun-qbt:
    <<: *hardened
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    container_name: gluetun-qbt
    cap_add:
      - NET_ADMIN
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ../common/secrets/.runtime/vpn.env
    environment:
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING=on
      - VPN_SERVICE_PROVIDER=VPN Provider
      - SERVER_REGIONS=REGION
      - FIREWALL_OUTBOUND_SUBNETS=SUBNETS
      - HTTP_CONTROL_SERVER_ADDRESS=:8005
      - DOT=off
      - BLOCK_MALICIOUS=off
    volumes:
      - /mnt/app/db/gluetun-qbt:/gluetun
    ports:
      - 6881:6881 # BT
      - 6881:6881/udp # qBT
      - 8081:8081 # qBT
      - 8005:8005 # control server
    healthcheck:
      test: ["CMD-SHELL", "/gluetun-entrypoint healthcheck"]
      interval: 5s
      timeout: 5s
      start_period: 90s
      retries: 3
    networks:
      - vpn_egress
      - arr_control

  qbittorrent:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/qbittorrent:5.2.0
    container_name: qbittorrent
    env_file:
      - ../common/secrets/.runtime/media.env
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
      - WEBUI_PORT=8081
      - DOCKER_MODS=ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
      - GSP_QBT_ADDR=http://localhost:8081
      - GSP_GTN_ADDR=http://localhost:8005
    volumes:
      - /mnt/app/db/qbittorrent:/config
      - /mnt/download:/download
    network_mode: "service:gluetun-qbt"
    depends_on:
      gluetun-qbt:
        condition: service_healthy
    stop_grace_period: 30s

  qui:
    <<: *hardened
    image: ghcr.io/autobrr/qui:v1.18.0
    container_name: qui
    volumes:
      - /mnt/app/db/qui:/config
    ports:
      - 7476:7476
    depends_on:
      - qbittorrent
    # arr_egress (bridge) needed for Docker to DNAT host:7476 → container.
    # Internal-only network sets lose port-publishing NAT.
    networks:
      - edge_internal
      - arr_egress

  sabnzbd:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/sabnzbd:5.0.3
    container_name: sabnzbd
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/sabnzbd:/config
      - /mnt/download:/download
    ports:
      - 8085:8085
    networks:
      - arr_control
      - arr_egress

  # gluetun-music — VPN egress for slskd
  gluetun-music:
    <<: *hardened
    image: qmcgaw/gluetun:v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
    container_name: gluetun-music
    cap_add:
      - NET_ADMIN
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    devices:
      - /dev/net/tun:/dev/net/tun
    env_file:
      - ../common/secrets/.runtime/vpn.env
    environment:
      - VPN_SERVICE_PROVIDER=VPN PROVIDER
      - SERVER_REGIONS=REGION
      - VPN_PORT_FORWARDING=on
      - FIREWALL_OUTBOUND_SUBNETS=SUBNETS
      - HTTP_CONTROL_SERVER_ADDRESS=:8011
    ports:
      - 5030:5030 # slskd
      - 8012:8011 # gluetun-music control server
    volumes:
      - /mnt/app/db/gluetun-music:/gluetun
    healthcheck:
      test: ["CMD-SHELL", "/gluetun-entrypoint healthcheck"]
      interval: 5s
      timeout: 5s
      start_period: 90s
      retries: 3
    networks:
      - vpn_egress
      - arr_control

  slskd:
    <<: *hardened
    image: slskd/slskd:latest@sha256:ab9ed50e028b524cefdb7c1dd8ebca368a076e18441ee8ac2326473eb850b4c3
    container_name: slskd
    environment:
      - SLSKD_REMOTE_CONFIGURATION=false
      - SLSKD_SHARED_DIR=/music
      - SLSKD_DOWNLOAD_DIR=/downloads
      - SLSKD_HEALTH_KEY=slskd-homepage-readonly-key
    user: "999:999"
    volumes:
      - /mnt/app/db/slskd/config:/app
      - /mnt/download/aurral:/downloads
      - /mnt/data2/media/music:/music:ro
      - /mnt/app/db/slskd-port-sync/healthcheck.sh:/healthcheck.sh:ro
    network_mode: "service:gluetun-music"
    depends_on:
      gluetun-music:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 180s
    labels:
      - "autoheal=true"

  soularr:
    <<: *hardened
    image: mrusse08/soularr:v1.2.2
    container_name: soularr
    user: "999:999"
    environment:
      - TZ=Some/Region
      - SCRIPT_INTERVAL=300
    volumes:
      - /mnt/download/aurral:/downloads
      - /mnt/app/db/soularr:/data
    networks:
      - arr_control

  slskd-port-sync:
    <<: *hardened
    image: alpine:latest@sha256:5b10f432ef3da1b8d4c7eb6c487f2f5a8f096bc91145e68878dd4a5019afde11
    container_name: slskd-port-sync
    user: "999:999"
    depends_on:
      gluetun-music:
        condition: service_healthy
    volumes:
      - /mnt/app/db/slskd/config:/configs/slskd
      - /mnt/app/db/slskd-port-sync/sync.sh:/sync.sh:ro
    entrypoint: ["/bin/sh", "/sync.sh"]
    # Reaches gluetun-music's HTTP control server via container DNS;
    # both endpoints sit on arr_control.
    networks:
      - arr_control


networks:
  nas_default:
    external: true
  edge_internal:
    external: true
  arr_control:
    external: true
  arr_egress:
    external: true
  vpn_egress:
    external: true

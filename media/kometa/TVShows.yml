############################
#        TEMPLATES         #
############################
templates:

  Regular:
    sort_title: "<<collection_name>>"
    sync_mode: sync
    collection_order: release
    schedule: monthly(10)

  TV Collection:
    optional:
      - trakt_list
      - imdb_list
      - tvdb_show
    trakt_list_details: <<trakt_list>>
    imdb_list: <<imdb_list>>
    tvdb_show: <<tvdb_show>>
    sort_title: <<collection_name>>
    collection_order: release

collections:


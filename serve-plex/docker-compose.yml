# host: server
# project: serve-plex — Plex media server + Plex-adjacent request UIs
#
# Phase 4 trust zone. Services migrated from:
#   - nas/  — plex, seerr, requestrr
#
# Plex stays on host network for 32400 (DNS rebinding requires direct TLS,
# can't proxy via Traefik). seerr and requestrr go through Traefik.

x-defaults: &defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging: &log
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Phase 5: cap_drop baseline. Consumers do `<<: *hardened` + inline
# `cap_add: [...]` for caps they need back. `cap_drop: [ALL]` removes
# the 14 default capabilities Docker grants.
x-hardened: &hardened
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging: *log

services:
  plex:
    <<: *hardened
    # Plex image init chowns /config + /transcode to PLEX_UID and drops
    # the daemon to that user. Needs CHOWN/FOWNER + DAC_OVERRIDE for the
    # filesystem fixup, SETUID/SETGID for the privilege drop. No NET_*
    # caps — Plex binds high ports only (32400, 8324, 32469, 32410-14).
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    image: plexinc/pms-docker:1.43.1.10611-1e34174b1
    container_name: plex
    environment:
      - PLEX_UID=999
      - PLEX_GID=999
      - TZ=Some/Region
      - PLEX_CLAIM=<claim>
      - ADVERTISE_IP=http://plex.yourdomain.com:45738/
    ports:
      - 32400:32400/tcp #main plex app
      - 8324:8324/tcp   #plex roku/plex companion control
      - 32469:32469/tcp #plex dlna
      - 32410:32410/udp # gdm network discovery
      - 32412:32412/udp # gdm network discovery
      - 32413:32413/udp # gdm network discovery
      - 32414:32414/udp # gdm network discovery
    volumes:
      - /mnt/app/db/plex/config:/config
      - /mnt/download/transcode/plex:/transcode
      - /mnt/data/media:/data/media
      - /mnt/data2/media:/data2/media
      - /dev/dvb:/dev/dvb # USB TV Tuner
    devices:
      - /dev/dri:/dev/dri
    networks:
      - arr_control
      - serve_plex_api
      - nas_default

  seerr:
    <<: *hardened
    image: ghcr.io/seerr-team/seerr:v3.3.0
    container_name: seerr
    init: true
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/seerr:/app/config
    ports:
      - 5055:5055
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge_internal"
      - "traefik.http.routers.seerr.rule=Host(`requests.yourdomain.com`) || Host(`overseerr.yourdomain.com`)"
      - "traefik.http.routers.seerr.entrypoints=websecure"
      - "traefik.http.routers.seerr.tls.certresolver=myresolver"
      - "traefik.http.routers.seerr.middlewares=crowdsec@file,seerr-secure-headers@docker,seerr-ratelimit@docker"
      # Security headers
      - "traefik.http.middlewares.seerr-secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.seerr-secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.seerr-secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.seerr-secure-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.seerr-secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.seerr-secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.seerr-secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.seerr-secure-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=(), payment=()"
      - "traefik.http.middlewares.seerr-secure-headers.headers.customResponseHeaders.X-Powered-By="
      - "traefik.http.middlewares.seerr-secure-headers.headers.customResponseHeaders.Server="
      # Rate limiting
      - "traefik.http.middlewares.seerr-ratelimit.ratelimit.average=150"
      - "traefik.http.middlewares.seerr-ratelimit.ratelimit.burst=300"
      - "traefik.http.middlewares.seerr-ratelimit.ratelimit.period=1m"
    networks:
      - edge_internal
      - arr_control
      - serve_plex_api
      - arr_egress

  requestrr:
    <<: *hardened
    image: thomst08/requestrr:v2.1.10
    container_name: requestrr
    ports:
      - 4545:4545
    volumes:
      - /mnt/app/db/requestrr:/root/config
    networks:
      - edge_internal
      - arr_control
      - serve_plex_api
      - arr_egress


networks:
  nas_default:
    external: true
  edge_internal:
    external: true
  arr_control:
    external: true
  arr_egress:
    external: true
  serve_plex_api:
    external: true

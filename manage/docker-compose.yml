# host: server
# project: manage — *arr managers + Aurral
#
# Phase 4 trust zone. Services migrated from:
#   - media/  — sonarr, sonarr4k, radarr, radarr4k, bazarr, bazarr4k
#   - music/  — lidarr, aurral

x-defaults: &defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging: &log
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Phase 5: cap_drop baseline. Consumers do `<<: *hardened` + inline
# `cap_add: [...]` for caps they need back. `cap_drop: [ALL]` removes
# the 14 default capabilities Docker grants.
x-hardened: &hardened
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging: *log

# Phase 5: LSIO/PUID-based containers need these 5 caps to chown +
# drop privileges at startup. Used uniformly across the *arrs + aurral.
x-lsio-caps: &lsio_caps
  - CHOWN
  - FOWNER
  - DAC_OVERRIDE
  - SETUID
  - SETGID

services:
  sonarr:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr
    environment:
      - PUID=999
      - PGID=999
    volumes:
      - /mnt/app/db/sonarr/config:/config
      - /mnt/data:/data
      - /mnt/data2:/data2
      - /mnt/download:/download
    ports:
      - 8989:8989
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - edge_internal
      - arr_control
      - arr_egress

  sonarr4k:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/sonarr:4.0.17
    container_name: sonarr4k
    environment:
      - PUID=999
      - PGID=999
    volumes:
      - /mnt/app/db/sonarr4k/config:/config
      - /mnt/data:/data
      - /mnt/data2:/data2
      - /mnt/download:/download
    ports:
      - 9090:9090
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:9090/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - edge_internal
      - arr_control
      - arr_egress

  radarr:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/radarr:6.2.1
    container_name: radarr
    environment:
      - PUID=999
      - PGID=999
    volumes:
      - /mnt/app/db/radarr/config:/config
      - /mnt/data:/data
      - /mnt/data2:/data2
      - /mnt/download:/download
    ports:
      - 7878:7878
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:7878/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - edge_internal
      - arr_control
      - arr_egress

  radarr4k:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/radarr:6.2.1
    container_name: radarr4k
    environment:
      - PUID=999
      - PGID=999
    volumes:
      - /mnt/app/db/radarr4k/config:/config
      - /mnt/data:/data
      - /mnt/data2:/data2
      - /mnt/download:/download
    ports:
      - 7979:7979
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:7979/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - edge_internal
      - arr_control
      - arr_egress

  bazarr:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/bazarr/config:/config
      - /mnt/app/db/bazarr/subcleaner:/subcleaner
      - /mnt/data:/data
      - /mnt/data2:/data2
    ports:
      - 6767:6767
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:6767/api/system/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - edge_internal
      - arr_control
      - arr_egress

  bazarr4k:
    <<: *hardened
    cap_add: *lsio_caps
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr4k
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/bazarr4k/config:/config
      - /mnt/app/db/bazarr4k/subcleaner:/subcleaner
      - /mnt/data:/data
      - /mnt/data2:/data2
    ports:
      - 6868:6868
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:6868/api/system/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - edge_internal
      - arr_control
      - arr_egress

  lidarr:
    <<: *hardened
    cap_add: *lsio_caps
    # nightly = the plugins-capable Lidarr branch (Servarr wiki). One-way DB
    # migration from develop. Deezer + Tidal acquisition is now native Lidarr
    # plugins (Soulseek stays via Soularr+slskd) — replaced RandomNinjaAtk
    # arr-scripts, which was removed (it ran curl|bash on every boot from a
    # now-unmaintained repo).
    image: lscr.io/linuxserver/lidarr:nightly@sha256:706aade16e8b35f3a981e0f32229b062e28d39af20b9c6e8bd19cc9a9d911753
    container_name: lidarr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/lidarr/config:/config
      - /mnt/data:/data
      - /mnt/data2:/data2
      - /mnt/download:/download
    ports:
      - 8686:8686
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:8686/ping"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "autoheal=true"
    networks:
      - edge_internal
      - arr_control
      - arr_egress

  aurral:
    <<: *hardened
    cap_add: *lsio_caps
    image: ghcr.io/lklynet/aurral:1.76.50
    container_name: aurral
    environment:
      - PUID=999
      - PGID=999
      - DOWNLOAD_FOLDER=/app/downloads
      - AUTH_PROXY_ENABLED=true
      - AUTH_PROXY_HEADER=X-Auth-Request-User
      - AUTH_PROXY_TRUSTED_IPS=
      - AUTH_PROXY_ADMIN_USERS=user@yourdomain.com
      - TRUST_PROXY=true
    ports:
      - "3005:3001"
    volumes:
      - /mnt/download/aurral:/app/downloads
      - /mnt/app/db/aurral:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=edge_internal"
      - "traefik.http.routers.aurral.rule=Host(`music.yourdomain.com`)"
      - "traefik.http.routers.aurral.entrypoints=websecure"
      - "traefik.http.routers.aurral.tls.certresolver=myresolver"
      - "traefik.http.routers.aurral.middlewares=crowdsec@file,oauth2-proxy@docker,aurral-secure-headers@docker"
      - "traefik.http.services.aurral.loadbalancer.server.port=3001"
      - "traefik.http.middlewares.aurral-secure-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.aurral-secure-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.aurral-secure-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.aurral-secure-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.aurral-secure-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.aurral-secure-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.aurral-secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.aurral-secure-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=(), payment=()"
      - "traefik.http.middlewares.aurral-secure-headers.headers.customResponseHeaders.X-Powered-By="
      - "traefik.http.middlewares.aurral-secure-headers.headers.customResponseHeaders.Server="
    networks:
      - edge_internal
      - arr_control
      - arr_egress


networks:
  nas_default:
    external: true
  edge_internal:
    external: true
  arr_control:
    external: true
  arr_egress:
    external: true

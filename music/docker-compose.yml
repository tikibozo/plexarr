services:
  lidarr:
    image: lscr.io/linuxserver/lidarr:develop
    container_name: lidarr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/lidarr/config:/config
      - /mnt/app/db/lidarr/custom-services.d:/custom-services.d
      - /mnt/app/db/lidarr/custom-cont-init.d:/custom-cont-init.d
      - /mnt/data:/data
      - /mnt/download:/download
      - /mnt/data/media/music-videos:/music-videos
      - /mnt/data/media/music-lidarr-extended:/downloads-lidarr-extended
    ports:
      - 8686:8686
    restart: unless-stopped

  aurral:
    image: ghcr.io/lklynet/aurral:latest
    container_name: aurral
    restart: unless-stopped
    environment:
      # PUID/PGID must match the owner of shared download dirs (e.g. plex).
      # Without this, Aurral runs as its baked-in nodejs user and can't
      # write to /mnt/download/aurral. docker group_add does NOT fix it.
      - PUID=999
      - PGID=999
      - DOWNLOAD_FOLDER=/app/downloads
      - AUTH_PROXY_ENABLED=true
      - AUTH_PROXY_HEADER=X-Auth-Request-User
      - AUTH_PROXY_TRUSTED_IPS=
      - AUTH_PROXY_ADMIN_USERS=user1@domain.com,user2@domain.com
      - TRUST_PROXY=true
    ports:
      - "3005:3001"
    volumes:
      - /mnt/download/aurral:/app/downloads
      - /mnt/app/db/aurral:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aurral.rule=Host(`music.yourdomain.com`)"
      - "traefik.http.routers.aurral.entrypoints=websecure"
      - "traefik.http.routers.aurral.tls.certresolver=myresolver"
      - "traefik.http.routers.aurral.middlewares=oauth2-proxy@docker"
      - "traefik.http.services.aurral.loadbalancer.server.port=3001"
      - "traefik.docker.network=nas_default"
    networks:
      - default
      - nas_default

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-music
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - SERVER_REGIONS=SOME_REGION
      - VPN_PORT_FORWARDING=on
      - OPENVPN_USER=user
      - OPENVPN_PASSWORD=pass
      - FIREWALL_OUTBOUND_SUBNETS=1.1.1.1/1
      - HTTP_CONTROL_SERVER_ADDRESS=:8011
    ports:
      - 5030:5030  # slskd
      - 8012:8011  # gluetun control server
    volumes:
      - /mnt/app/db/gluetun-music:/gluetun
    restart: unless-stopped

  gluetun2:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-music2
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=private internet access
      - SERVER_REGIONS=SOME_REGION
      - VPN_PORT_FORWARDING=on
      - OPENVPN_USER=user
      - OPENVPN_PASSWORD=pass
      - FIREWALL_OUTBOUND_SUBNETS=1.1.1.1/1
      - HTTP_CONTROL_SERVER_ADDRESS=:8011
    ports:
      - 5031:5031  # slskd2
      - 8013:8011  # gluetun2 control server
    volumes:
      - /mnt/app/db/gluetun-music2:/gluetun
    restart: unless-stopped

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    environment:
      - SLSKD_REMOTE_CONFIGURATION=false
      - SLSKD_SHARED_DIR=/music
      - SLSKD_DOWNLOAD_DIR=/downloads
      # Readonly API key from slskd.yml — used by the custom healthcheck
      # to verify Soulseek connection state (isLoggedIn).
      - SLSKD_HEALTH_KEY=changeme
    user: "999:999"
    volumes:
      - /mnt/app/db/slskd/config:/app
      - /mnt/download/aurral:/downloads
      - /mnt/data/media/music:/music:ro
      - ./slskd-port-sync/healthcheck.sh:/healthcheck.sh:ro
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    # Stock slskd healthcheck only probes /health locally — it cannot detect
    # the "netns got yanked when gluetun restarted, DNS is broken, Soulseek
    # login is lost" state. This custom script also checks /api/v0/server for
    # isLoggedIn=true, and autoheal-music restarts the container when unhealthy.
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 180s
    labels:
      - "autoheal=true"
    restart: unless-stopped

  lidarr2:
    image: lscr.io/linuxserver/lidarr:develop
    container_name: lidarr2
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/lidarr2/config:/config
      - /mnt/app/db/lidarr2/config/custom-services.d:/custom-services.d
      - /mnt/app/db/lidarr2/config/custom-cont-init.d:/custom-cont-init.d
      - /mnt/data:/data
      - /mnt/download:/download
      - /mnt/data/media/music-videos:/music-videos
      - /mnt/data/media/music-lidarr-extended:/downloads-lidarr-extended
      - /mnt/download/aurral2:/download/aurral
    ports:
      - 8687:8686
    restart: unless-stopped

  aurral2:
    image: ghcr.io/lklynet/aurral:latest
    container_name: aurral2
    restart: unless-stopped
    environment:
      - PUID=999
      - PGID=999
      - DOWNLOAD_FOLDER=/app/downloads
      - AUTH_PROXY_ENABLED=true
      - AUTH_PROXY_HEADER=X-Auth-Request-User
      - AUTH_PROXY_TRUSTED_IPS=
      - AUTH_PROXY_ADMIN_USERS=user1@domain.com,user2@domain.com
      - TRUST_PROXY=true
    ports:
      - "3006:3001"
    volumes:
      - /mnt/download/aurral2:/app/downloads
      - /mnt/app/db/aurral2:/app/backend/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aurral2.rule=Host(`music2.yourdomain.com`)"
      - "traefik.http.routers.aurral2.entrypoints=websecure"
      - "traefik.http.routers.aurral2.tls.certresolver=myresolver"
      - "traefik.http.routers.aurral2.middlewares=oauth2-proxy@docker"
      - "traefik.http.services.aurral2.loadbalancer.server.port=3001"
      - "traefik.docker.network=nas_default"
    networks:
      - default
      - nas_default

  slskd2:
    image: slskd/slskd:latest
    container_name: slskd2
    environment:
      - SLSKD_REMOTE_CONFIGURATION=false
      - SLSKD_SHARED_DIR=/music
      - SLSKD_DOWNLOAD_DIR=/downloads
      # The image bakes SLSKD_HTTP_PORT=5030 and the built-in healthcheck uses
      # it. Any slskd instance whose web.port differs from 5030 MUST set this
      # env or the container will be "unhealthy" forever even though it's fine.
      - SLSKD_HTTP_PORT=5031
      - SLSKD_HEALTH_KEY=changeme
    user: "999:999"
    volumes:
      - /mnt/app/db/slskd2/config:/app
      - /mnt/download/aurral2:/downloads
      - /mnt/data/media/music-erica:/music:ro
      - ./slskd-port-sync/healthcheck.sh:/healthcheck.sh:ro
    network_mode: "service:gluetun2"
    depends_on:
      - gluetun2
    healthcheck:
      test: ["CMD", "/bin/sh", "/healthcheck.sh"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 180s
    labels:
      - "autoheal=true"
    restart: unless-stopped

  # Watches the Docker socket for containers labeled autoheal=true with
  # unhealthy status and restarts them. Paired with the custom slskd
  # healthcheck above, this self-heals slskd when the gluetun sidecar
  # recycles and drags slskd's DNS/netns state with it.
  autoheal-music:
    image: willfarrell/autoheal:latest
    container_name: autoheal-music
    restart: always
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      - AUTOHEAL_INTERVAL=30
      - AUTOHEAL_START_PERIOD=60
      - DOCKER_SOCK=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # Polls each gluetun control server for the PIA dynamic forwarded port
  # and rewrites soulseek.listen_port in each slskd.yml. slskd hot-reloads
  # on YAML change, so no restart is needed when PIA rotates the port
  # (leases last ~62 days).
  slskd-port-sync:
    image: alpine:latest
    container_name: slskd-port-sync
    user: "999:999"
    depends_on:
      - gluetun
      - gluetun2
    volumes:
      - /mnt/app/db/slskd/config:/configs/slskd
      - /mnt/app/db/slskd2/config:/configs/slskd2
      - ./slskd-port-sync/sync.sh:/sync.sh:ro
    entrypoint: ["/bin/sh", "/sync.sh"]
    restart: unless-stopped

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    restart: unless-stopped
    environment:
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_OIDC_ISSUER_URL=https://auth.yourdomain.com
      - OAUTH2_PROXY_CLIENT_ID=changeme
      - OAUTH2_PROXY_CLIENT_SECRET=changeme
      - OAUTH2_PROXY_COOKIE_SECRET=changeme
      - OAUTH2_PROXY_COOKIE_SECURE=true
      - OAUTH2_PROXY_COOKIE_DOMAINS=.yourdomain.com
      - OAUTH2_PROXY_SET_XAUTHREQUEST=true
      - OAUTH2_PROXY_PASS_USER_HEADERS=true
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_REVERSE_PROXY=true
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
      - OAUTH2_PROXY_UPSTREAMS=static://202
      - OAUTH2_PROXY_WHITELIST_DOMAINS=.yourdomain.com
      - OAUTH2_PROXY_AUTHENTICATED_EMAILS_FILE=/config/authenticated-emails.txt
    volumes:
      - /mnt/app/db/oauth2-proxy:/config:ro
    ports:
      - 4180:4180
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.oauth2-proxy.forwardauth.address=http://oauth2-proxy:4180/"
      - "traefik.http.middlewares.oauth2-proxy.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.oauth2-proxy.forwardauth.authResponseHeaders=X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Preferred-Username,Set-Cookie"
      - "traefik.docker.network=nas_default"
      # Route /oauth2/* paths (sign_in, callback, sign_out) to oauth2-proxy
      - "traefik.http.routers.oauth2-proxy-route.rule=Host(`music.yourdomain.com`) && PathPrefix(`/oauth2`) || Host(`music2.yourdomain.com`) && PathPrefix(`/oauth2`)"
      - "traefik.http.routers.oauth2-proxy-route.entrypoints=websecure"
      - "traefik.http.routers.oauth2-proxy-route.tls.certresolver=myresolver"
      - "traefik.http.routers.oauth2-proxy-route.priority=100"
      - "traefik.http.routers.oauth2-proxy-route.service=oauth2-proxy-svc"
      - "traefik.http.services.oauth2-proxy-svc.loadbalancer.server.port=4180"
    networks:
      - default
      - nas_default

  # Complements Aurral: Aurral handles user-driven discovery, Soularr
  # polls each Lidarr's wanted/missing list and dispatches searches +
  # downloads through the corresponding slskd instance.
  soularr:
    image: mrusse08/soularr:latest
    container_name: soularr
    user: "999:999"
    environment:
      - TZ=Some/Region
      - SCRIPT_INTERVAL=300
    volumes:
      - /mnt/download/aurral:/downloads
      - /mnt/app/db/soularr:/data
    restart: unless-stopped

  soularr2:
    image: mrusse08/soularr:latest
    container_name: soularr2
    user: "999:999"
    environment:
      - TZ=Some/Region
      - SCRIPT_INTERVAL=300
    volumes:
      - /mnt/download/aurral2:/downloads
      - /mnt/app/db/soularr2:/data
    restart: unless-stopped

networks:
  nas_default:
    external: true

# host: server
# project: process — post-processing, analytics, *arr-tooling
#
# Phase 4 trust zone. Services migrated from:
#   - media/  — tdarr, whisper, unpackerr, kometa, recyclarr,
#               fetcharr, tautulli, kometa-ai (commented)
#   - rpt/    — tracearr + tracearr-db (timescale) + tracearr-redis
#   - sys/    — checkrr

x-defaults: &defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging: &log
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# Phase 5: cap_drop baseline. Consumers do `<<: *hardened` + inline
# `cap_add: [...]` for caps they need back. `cap_drop: [ALL]` removes
# the 14 default capabilities Docker grants.
x-hardened: &hardened
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  logging: *log

# Phase 5: LSIO/PUID-based containers need these 5 caps to chown +
# drop privileges at startup.
x-lsio-caps: &lsio_caps
  - CHOWN
  - FOWNER
  - DAC_OVERRIDE
  - SETUID
  - SETGID

services:
  tdarr:
    <<: *hardened
    cap_add: *lsio_caps
    image: ghcr.io/haveagitgat/tdarr:2.81.01
    container_name: tdarr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
      - UMASK_SET=002
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - nodeName=server
    volumes:
      - /mnt/app/db/tdarr/server:/app/server
      - /mnt/app/db/tdarr/configs:/app/configs
      - /mnt/app/db/tdarr/logs:/app/logs
      - /mnt/download/transcode/tdarr:/temp
      - /mnt/data/media:/media
      - /mnt/data2/media:/media2
      - /mnt/data/user/Download:/download
    ports:
      - 8265:8265 # webUI port
      # 8266 (server), 8267-8268 (internal node ports) intentionally NOT
      # host-bound — internalNode=true serves all transcoding internally.
    devices:
      - /dev/dri:/dev/dri
    networks:
      - arr_egress

  # Subarr stack — subtitle coordination (github.com/coaxk/subarr).
  # subgen is the Whisper transcription worker (patched McCloudS/subgen,
  # drop-in replacement for the old whisper-asr-webservice — Bazarr's
  # whisperai provider points at subgen:9000). subarr orchestrates: reads
  # Bazarr wanted lists, probes for genuinely-missing subs, queues jobs to
  # subgen, triggers Bazarr rescans. CPU-only: faster-whisper/CTranslate2
  # has no Intel iGPU backend, so the iGPU stays with Tdarr/Plex.
  subgen:
    <<: *hardened
    # entrypoint chowns bind mounts + gosu-drops to PUID
    cap_add: *lsio_caps
    image: ghcr.io/coaxk/subarr-subgen:2026.05.3-r8
    container_name: subgen
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
      - TRANSCRIBE_DEVICE=cpu
      - WHISPER_MODEL=large-v3-turbo
      # CPU transcription: one job at a time; Bazarr's synchronous provider
      # requests bypass this limit by design, so 1 avoids three-way pile-ups.
      - CONCURRENT_TRANSCRIPTIONS=1
    volumes:
      - /mnt/app/db/subgen/models:/subgen/models
      - /mnt/app/db/subgen/cache:/cache
      # Least-privilege: only the media subtrees, not the whole dataset. Paths
      # match Bazarr (/mnt/data->/data, /mnt/data2->/data2) so transcription
      # job paths resolve. subgen's entrypoint only chowns /subgen,/cache,/tmp.
      - /mnt/data/media:/data/media
      - /mnt/data2/media:/data2/media
    networks:
      - arr_control
      - arr_egress  # whisper model download (huggingface)

  subarr:
    <<: *hardened
    # runs as root, app handles PUID/PGID for sidecar writes into
    # plex-owned (999) media dirs
    cap_add: *lsio_caps
    image: ghcr.io/coaxk/subarr:2.3.1
    container_name: subarr
    depends_on:
      - socket-proxy-subarr
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
      - UMASK=002
      - SUBARR_PORT=9922
      - SUBARR_DB_PATH=/config/subarr.db
      - SUBGEN_URL=http://subgen:9000
      - SUBGEN_CONTAINER=subgen
      # Docker access via read-only socket-proxy (metadata GETs only,
      # wizard auto-detect + monitor); raw docker.sock never mounted.
      - DOCKER_HOST=tcp://socket-proxy-subarr:2375
      - SUBARR_DOCKER_PROXY_URL=http://socket-proxy-subarr:2375
    volumes:
      - /mnt/app/db/subarr:/config
      # Least-privilege: mount only the media subtrees, not the whole datasets.
      # Paths match Bazarr (/mnt/data->/data, /mnt/data2->/data2) so subarr
      # resolves Bazarr's wanted-list paths and writes sidecars there (999).
      # Background: subarr 2.2.0's entrypoint ran `chown -R $PUID /data` with a
      # top-level-only guard; with the whole /mnt/data mounted it recursively
      # re-owned the dataset, breaking Nextcloud + user files. Fixed upstream in
      # 2.2.1 (coaxk/subarr#369 / PR #370 — chowns only the DB dir, never /data).
      # Narrowing here means even a regression can't reach anything but media.
      - /mnt/data/media:/data/media
      - /mnt/data2/media:/data2/media
    ports:
      - 9922:9922
    networks:
      - arr_control
      - serve_plex_api  # tautulli playback signal + plex refresh/audio hints
      - process_subarr_internal
      - arr_egress  # HF model pulls (QE/VAD opt-ins) + port-publish NAT

  # Read-only docker API proxy for subarr (same pattern as
  # socket-proxy-homepage): container/network/image METADATA only, every
  # write (POST/EXEC/DELETE/...) refused — a compromised subarr cannot
  # pivot to host root. Trade-off: subarr's in-app subgen restart is
  # disabled; restart subgen manually.
  socket-proxy-subarr:
    <<: *hardened
    image: lscr.io/linuxserver/socket-proxy:3.4.0
    container_name: socket-proxy-subarr
    read_only: true
    tmpfs:
      - /run
    environment:
      - CONTAINERS=1 # GET container list/inspect/logs (wizard + log tail)
      - NETWORKS=1   # GET /networks (wizard discovery)
      - IMAGES=1     # GET image labels (version detection)
      - INFO=1       # GET /info (reachability)
      - PING=1
      - VERSION=1
      - POST=0       # no writes — blocks restart, create, kill, update
      - ALLOW_START=0
      - ALLOW_STOP=0
      - ALLOW_RESTARTS=0
      - EXEC=0
      - DELETE=0
      - VOLUMES=0
      - BUILD=0
      - COMMIT=0
      - CONFIGS=0
      - DISTRIBUTION=0
      - EVENTS=0
      - NODES=0
      - PLUGINS=0
      - SECRETS=0
      - SERVICES=0
      - SESSION=0
      - SWARM=0
      - SYSTEM=0
      - TASKS=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - process_subarr_internal

  unpackerr:
    <<: *hardened
    image: golift/unpackerr:0.15.2
    container_name: unpackerr
    user: 999:999
    env_file:
      - ../common/secrets/.runtime/media.env
    environment:
      - TZ=Some/Region
      - UN_LOG_FILE=/logs/unpackerr.log
      - UN_LOG_QUEUES=20m
      - UN_SONARR_0_URL=http://sonarr:8989
      - UN_SONARR_0_PROTOCOLS=torrent,usenet
      - UN_SONARR_1_URL=http://sonarr4k:9090
      - UN_SONARR_1_PROTOCOLS=torrent,usenet
      - UN_RADARR_0_URL=http://radarr:7878
      - UN_RADARR_0_PROTOCOLS=torrent,usenet
      - UN_RADARR_1_URL=http://radarr4k:7979
      - UN_RADARR_1_PROTOCOLS=torrent,usenet
      - UN_LIDARR_0_URL=http://lidarr:8686
      - UN_LIDARR_0_PROTOCOLS=torrent,usenet
    volumes:
      - /mnt/download:/download
      - /mnt/app/db/unpackerr/logs:/logs
    networks:
      - arr_control

  kometa:
    <<: *hardened
    # cap_drop ALL strips root's DAC bypass; kometa rotates logs in
    # /config/logs which is owned by plex:plex 0755 on the host, so root
    # without DAC_OVERRIDE cannot create/rename files there. Silently
    # failed every daily run from 2026-05-15 (Phase 6c recreate) through
    # 2026-05-18 with `PermissionError: '/config/logs/meta-9.log'`.
    # Same class of bug as the rclone DAC_READ_SEARCH fix, but kometa
    # writes (rotation) so it needs DAC_OVERRIDE not the read-only variant.
    cap_add:
      - DAC_OVERRIDE
    image: kometateam/kometa:v2.4.4
    container_name: kometa
    environment:
      - KOMETA_CONFIG=/config/config.yml
      - KOMETA_TIMES=10:00
    volumes:
      - /mnt/app/db/kometa:/config
      # config.yml holds secrets — SOPS-managed, decrypted to .runtime and
      # mounted read-only over the /config dir mount. Root reads it via the
      # DAC_OVERRIDE cap already granted above (for log rotation).
      - ../common/secrets/.runtime/kometa-config.yml:/config/config.yml:ro
      - ./kometa/r:/r
      - ./kometa/rc:/rc
      - ./kometa/rc:/rf
      - ./kometa/ov:/ov
    networks:
      - arr_control
      - serve_plex_api
      - arr_egress

  recyclarr:
    <<: *hardened
    image: ghcr.io/recyclarr/recyclarr:8.6.0
    container_name: recyclarr
    environment:
      - TZ=Some/Region
    user: 999:999
    volumes:
      - /mnt/app/db/recyclarr:/config
    networks:
      - arr_control
      - arr_egress  # TRaSH-Guides repo + GitHub

  fetcharr:
    <<: *hardened
    image: egg82/fetcharr:2.2.0
    container_name: fetcharr
    user: 999:999
    env_file:
      - ../common/secrets/.runtime/media.env
    environment:
      - TZ=Some/Region
      - LOG_MODE=info
      - DATA_DIR=/data
      - CACHE_DIR=/cache
      - SEARCH_AMOUNT=5
      - SEARCH_INTERVAL=6hours
      - MONITORED_ONLY=true
      - MISSING_ONLY=false
      - USE_CUTOFF=true
      - RADARR_0_URL=http://radarr:7878
      - SONARR_0_URL=http://sonarr:8989
    volumes:
      - /mnt/app/db/fetcharr/data:/data
      - /mnt/app/db/fetcharr/cache:/cache
    networks:
      - arr_control

  tautulli:
    <<: *hardened
    # Tautulli image drops to the `tautulli` user via PUID/PGID; needs
    # SETUID/SETGID. Bind mount perms benefit from DAC_OVERRIDE.
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    image: tautulli/tautulli:v2.17.2
    container_name: tautulli
    environment:
      - PUID=999
      - PGID=999
      - TZ=Some/Region
    volumes:
      - /mnt/app/db/tautulli/data:/config
    ports:
      - 8181:8181
    networks:
      - serve_plex_api
      - arr_egress  # plex.tv metadata + notifications

  checkrr:
    <<: *hardened
    image: aetaric/checkrr:3.6.1
    container_name: checkrr
    ports:
      - 8585:8585/tcp
    volumes:
      - /mnt/app/db/checkrr/checkrr.yaml:/etc/checkrr.yaml
      - /mnt/app/db/checkrr:/config
      - /mnt/data/media:/media
      - /mnt/data2/media:/media2
    networks:
      - arr_control
      - arr_egress

  # Tracearr stack — Plex telemetry/analytics. Has its own internal
  # network for app↔db↔redis. Only `tracearr` itself needs outbound
  # network membership (receives Plex webhooks).
  tracearr:
    <<: *hardened
    image: ghcr.io/connorgallopo/tracearr:1.4.28
    container_name: tracearr
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - ../common/secrets/.runtime/rpt.env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - TZ=Some/Region
      - DATABASE_URL=postgres://tracearr:${DB_PASSWORD:-tracearr}@tracearr-db:5432/tracearr
      - REDIS_URL=redis://tracearr-redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      tracearr-db:
        condition: service_healthy
      tracearr-redis:
        condition: service_healthy
    labels:
      - "autoheal=true"
    networks:
      - process_tracearr_internal
      - serve_plex_api  # Plex sends webhooks here
      - arr_egress

  tracearr-db:
    <<: *hardened
    # Spilo entrypoint runs as root, manages /home/postgres/pgdata
    # permissions, then drops to postgres user.
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    image: timescale/timescaledb-ha:pg18.1-ts2.25.0
    container_name: tracearr-db
    shm_size: 512mb
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: postgres -c timescaledb.max_tuples_decompressed_per_dml_transaction=0 -c max_locks_per_transaction=4096 -c timescaledb.telemetry_level=off
    environment:
      - POSTGRES_USER=tracearr
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tracearr}
      - POSTGRES_DB=tracearr
    volumes:
      - /mnt/app/db/tracearr/data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracearr"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - process_tracearr_internal

  tracearr-redis:
    <<: *hardened
    # redis-alpine entrypoint uses `su-exec` to drop from root to redis user
    # (SETUID/SETGID), and the AOF temp-file write fails without
    # DAC_OVERRIDE on the host bind mount.
    cap_add:
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    image: redis:8-alpine
    container_name: tracearr-redis
    command: redis-server --appendonly yes
    volumes:
      - /mnt/app/db/tracearr/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - process_tracearr_internal

  # plex-watch-sync: bidirectional watched/progress mirror between configured
  # Plex accounts on the local server, scoped by Plex label (default `sync`).
  # Source: github.com/user/plex-watch-sync
  # Receives webhooks from Tautulli; calls Plex over serve_plex_api.
  # Holds reconcile bookkeeping (seen-keys JSON) in /app/state. The state
  # bind on the host must be chown 10001:10001 (the container's non-root
  # uid) before first start; with that, no cap_add is needed.
  plex-watch-sync:
    <<: *hardened
    image: ghcr.io/user/plex-watch-sync:0.5.4
    container_name: plex-watch-sync
    env_file:
      - ../common/secrets/.runtime/plex-watch-sync.env
    volumes:
      - ./plex-watch-sync/config.yaml:/app/config.yaml:ro
      - /mnt/app/db/plex-watch-sync:/app/state
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:38491/healthz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - serve_plex_api
      - arr_egress  # plex.tv outbound, for resolving friend server access tokens


networks:
  nas_default:
    external: true
  arr_control:
    external: true
  arr_egress:
    external: true
  serve_plex_api:
    external: true
  process_tracearr_internal:
    external: true
  process_subarr_internal:
    external: true
